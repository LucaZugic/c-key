site_name: c-key
site_description: Smart per-activity rules for Strava, on iOS Shortcuts
site_author: Luca Zugic

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Two Halves: architecture/two-halves.md
      - Hexagonal Layers: architecture/hexagonal-layers.md
      - Domain Model: architecture/domain-model.md
      - Ports and Adapters: architecture/ports-and-adapters.md
      - Dependency Rules: architecture/dependency-rules.md
  - Domain:
      - Ubiquitous Language: domain/ubiquitous-language.md
      - Aggregates: domain/aggregates.md
      - Domain Events: domain/domain-events.md
  - Integrations:
      - Strava: integrations/strava.md
      - Shortcuts Runtime: integrations/shortcuts-runtime.md
      - HealthKit: integrations/healthkit.md
      - Data Jar: integrations/data-jar.md
  - Ways of Working:
      - TDD: ways-of-working/tdd.md
      - Commits: ways-of-working/commits.md
      - Code Review: ways-of-working/code-review-checklist.md
      - Clean Code: ways-of-working/clean-code.md
      - Definition of Done: ways-of-working/definition-of-done.md
  - Product:
      - Vision: product/vision.md
      - Rules Engine: product/rules-engine.md
      - Shortcut Flow: product/shortcut-flow.md
      - Roadmap: product/roadmap.md
  - Distribution:
      - User Setup: distribution/user-setup.md
      - Strava App Registration: distribution/strava-app-registration.md
      - Publishing: distribution/publishing.md
  - Decisions:
      - Template: decisions/0000-template.md
      - ADR-0001 Pivot to Shortcut: decisions/0001-pivot-native-ios-to-shortcut.md
      - ADR-0002 TypeScript Strict: decisions/0002-typescript-strict-mode.md
      - ADR-0003 Hexagonal: decisions/0003-hexagonal-architecture.md
      - ADR-0004 Per-User Strava App: decisions/0004-per-user-strava-app.md
      - ADR-0005 TDD and DDD: decisions/0005-tdd-and-ddd.md
      - ADR-0006 Mute Not Private: decisions/0006-mute-not-private-strava-limitation.md
      - ADR-0007 No Coros: decisions/0007-no-coros-api.md
